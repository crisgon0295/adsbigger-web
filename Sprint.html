<style>
  :root{
    --obsidian:#0A0A0A; --bg:#111; --card:#1a1a1a;
    --red:#D51A05; --blue:#179DFF; --deep:#0D3DD9;
    --yellow:#F5C518; --line:rgba(255,255,255,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--obsidian);color:#fff;font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  body{overflow-x:hidden;}
  .sg{font-family:'Space Grotesk','DM Sans',sans-serif;font-weight:700;letter-spacing:-0.02em;}
  .serif{font-family:'DM Serif Display',serif;letter-spacing:-0.015em;}
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace;}
  .glass{background:linear-gradient(180deg,rgba(30,30,30,0.55),rgba(15,15,15,0.35));backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid var(--line);}
  @keyframes pulseWa{0%,100%{transform:scale(1);box-shadow:0 4px 20px rgba(37,211,102,0.4)}50%{transform:scale(1.08);box-shadow:0 8px 36px rgba(37,211,102,0.6)}}
  @keyframes shine{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
  @keyframes pulseDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
  .reveal{opacity:0;transform:translateY(18px);transition:all 800ms cubic-bezier(.2,.7,.2,1);}
  .reveal.on{opacity:1;transform:translateY(0);}
  ::selection{background:var(--red);color:#fff;}
  button{font-family:inherit;}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="sprint-shared.jsx" data-presets="react"></script>
<script type="text/babel" src="sprint-variant-a.jsx" data-presets="react"></script>
<script type="text/babel" src="sprint-variant-b.jsx" data-presets="react"></script>

<script type="text/babel" data-presets="react">
const {useState, useEffect} = React;

function VariantSwitcher(){
  const [variant, setVariant] = useState(()=>{
    try { return localStorage.getItem('sprint_variant') || 'A'; } catch { return 'A'; }
  });
  useEffect(()=>{
    try { localStorage.setItem('sprint_variant', variant); } catch {}
    window.scrollTo(0,0);
  },[variant]);

  return (
    <>
      <div style={{
        position:'fixed', top:14, left:'50%', transform:'translateX(-50%)',
        zIndex:200, display:'flex', gap:4, padding:5,
        background:'rgba(0,0,0,0.75)', backdropFilter:'blur(14px)',
        border:'1px solid rgba(255,255,255,0.12)', borderRadius:99
      }}>
        <div className="mono" style={{fontSize:10,color:'#888',letterSpacing:'.2em',padding:'8px 10px 8px 14px',alignSelf:'center'}}>VARIANTE</div>
        {[
          {k:'A', label:'Raw', color:'#D51A05'},
          {k:'B', label:'Editorial', color:'#179DFF'}
        ].map(v =>
          <button key={v.k} onClick={()=>setVariant(v.k)} className="sg"
            style={{
              background: variant===v.k ? v.color : 'transparent',
              color: variant===v.k ? '#fff' : '#ccc',
              border:'none', padding:'8px 16px', borderRadius:99,
              fontSize:11, letterSpacing:'.1em', textTransform:'uppercase',
              cursor:'pointer', transition:'all 200ms'
            }}>
            {v.k} · {v.label}
          </button>)}
      </div>
      {variant==='A' ? <SprintVariantA/> : <SprintVariantB/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<VariantSwitcher/>);
</script>
</body>
</html>
