const { useState, useEffect, useRef, useMemo } = React;

/* ============================================================
   Hooks + helpers
============================================================ */
function useInView(threshold = 0.15) {
  const ref = useRef(null);
  const [v, setV] = useState(false);
  useEffect(() => {
    const el = ref.current;if (!el) return;
    const io = new IntersectionObserver((es) => {
      es.forEach((e) => {if (e.isIntersecting) {setV(true);io.unobserve(el);}});
    }, { threshold });
    io.observe(el);return () => io.disconnect();
  }, [threshold]);
  return [ref, v];
}

function Reveal({ children, delay = 0, as: Tag = 'div', className = '', style = {} }) {
  const [r, v] = useInView();
  return <Tag ref={r} className={`reveal ${v ? 'visible' : ''} ${className}`} style={{ transitionDelay: `${delay}ms`, ...style }}>{children}</Tag>;
}

function useCounter(target, active, duration = 1400) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    if (!active) return;
    let raf, start;
    const ease = (t) => 1 - Math.pow(1 - t, 3);
    const step = (ts) => {
      if (!start) start = ts;
      const p = Math.min((ts - start) / duration, 1);
      setVal(target * ease(p));
      if (p < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [target, active, duration]);
  return val;
}

/* ============================================================
   Tweaks panel
============================================================ */
function useTweaks() {
  const [tw, setTw] = useState(() => ({ ...window.__TWEAKS__ }));
  const [editMode, setEditMode] = useState(false);
  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setEditMode(true);
      if (e.data.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const set = (patch) => {
    setTw((prev) => {
      const next = { ...prev, ...patch };
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
      return next;
    });
  };
  return { tw, set, editMode };
}

        onMouseOut={(e) => {e.currentTarget.style.transform = 'scale(1)';e.currentTarget.style.boxShadow = '0 4px 14px rgba(213,26,5,.25)';}}>
          Diagnóstico gratis</a>

}

/* ============================================================
   App
============================================================ */
function App() {
  const { tw, set, editMode } = useTweaks();
  // apply intensity
  useEffect(() => {
    const root = document.documentElement;
    if (tw.accentIntensity === 'quiet') root.style.setProperty('--red', '#B01604');else
    if (tw.accentIntensity === 'loud') root.style.setProperty('--red', '#FF2108');else
    root.style.setProperty('--red', '#D51A05');
  }, [tw.accentIntensity]);

  return (
    <>
      <Navbar />
      <Hero tw={tw} />
      <Marquee />
      <Problema />
      <Sistema />
      <Caso />
      <Proceso />
      <Garantia />
      <CTAFinal />
      <Footer />
      <WhatsAppFab />
      <TweaksPanel tw={tw} set={set} visible={editMode} />
    </>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
