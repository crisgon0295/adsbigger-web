/* Email modal */
function EmailModal({open, onClose}){
  const [form,setForm] = useState({nombre:'',email:'',empresa:''});
  const [sent,setSent] = useState(false);
  useEffect(()=>{
    // Read ?email=... prefill
    try{
      const u = new URL(window.location.href);
      const e = u.searchParams.get('email');
      if(e) setForm(f=>({...f, email:e}));
    }catch{}
  },[]);
  const valid = form.nombre.trim() && /.+@.+\..+/.test(form.email);
  if(!open) return null;
  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',backdropFilter:'blur(6px)',zIndex:100,display:'grid',placeItems:'center',padding:20,animation:'fadeUp 250ms ease'}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#0A0A0A',border:'1px solid rgba(255,255,255,0.1)',borderRadius:16,padding:'40px',maxWidth:480,width:'100%',position:'relative'}}>
        <button onClick={onClose} style={{position:'absolute',top:14,right:14,background:'transparent',border:'none',color:'#888',fontSize:22,cursor:'pointer'}}>×</button>
        {!sent ? (
          <>
            <div className="mono" style={{fontSize:11,color:'#D51A05',letterSpacing:'.25em',textTransform:'uppercase'}}>descarga gratuita</div>
            <div className="sg" style={{fontSize:34,lineHeight:1.05,marginTop:10}}>¿A qué correo te enviamos el PDF?</div>
            <p className="sub" style={{fontSize:17,color:'#b8b8b8',marginTop:12,fontStyle:'italic'}}>Llega en 2 minutos. Sin spam. Cancelas cuando quieras.</p>
            <form onSubmit={e=>{e.preventDefault(); if(valid) setSent(true);}} style={{marginTop:24,display:'flex',flexDirection:'column',gap:12}}>
              {[['nombre','Tu nombre'],['email','Email de trabajo'],['empresa','Empresa (opcional)']].map(([k,l])=>
                <div key={k}>
                  <div className="mono" style={{fontSize:10,color:'#888',letterSpacing:'.2em',textTransform:'uppercase',marginBottom:5}}>{l}</div>
                  <input value={form[k]} onChange={e=>setForm({...form,[k]:e.target.value})} type={k==='email'?'email':'text'}
                    style={{width:'100%',background:'#151515',border:'1px solid rgba(255,255,255,0.1)',color:'#fff',padding:'12px 14px',borderRadius:8,fontSize:15,fontFamily:'DM Sans',outline:'none'}}
                    onFocus={e=>e.target.style.borderColor='#D51A05'}
                    onBlur={e=>e.target.style.borderColor='rgba(255,255,255,0.1)'}/>
                </div>)}
              <button type="submit" disabled={!valid} className="sg" style={{marginTop:6,background:valid?'#D51A05':'#3a1c17',color:'#fff',padding:'14px 22px',borderRadius:8,border:'none',fontSize:16,cursor:valid?'pointer':'not-allowed',letterSpacing:'.02em',boxShadow:valid?'0 8px 24px rgba(213,26,5,.32)':'none'}}>
                Enviar PDF →
              </button>
            </form>
          </>
        ) : (
          <>
            <div style={{fontSize:36,color:'#179DFF'}}>✓</div>
            <div className="sg" style={{fontSize:30,marginTop:10,color:'#179DFF'}}>PDF enviado.</div>
            <p className="sub" style={{fontSize:17,color:'#ddd',marginTop:12,fontStyle:'italic',lineHeight:1.4}}>
              Revisa <span style={{color:'#fff'}}>{form.email}</span> en 2 minutos. Si no llega, mira spam o escríbenos por WhatsApp.
            </p>
            <button onClick={onClose} className="sg" style={{marginTop:22,background:'transparent',border:'1px solid rgba(255,255,255,0.15)',color:'#fff',padding:'12px 20px',borderRadius:8,fontSize:14,cursor:'pointer'}}>Cerrar</button>
          </>
        )}
      </div>
    </div>
  );
}

      <div style={{marginTop:32,display:'flex',gap:14,justifyContent:'center',flexWrap:'wrap'}}>
        <button onClick={()=>setModal(true)} className="sg" style={{background:'#D51A05',color:'#fff',padding:'18px 30px',borderRadius:8,border:'none',fontSize:16,cursor:'pointer',boxShadow:'0 12px 32px rgba(213,26,5,.4)'}}>Descarga el PDF →</button>
        <a href="BANT.html" className="sg" style={{background:'transparent',border:'2px solid #179DFF',color:'#179DFF',padding:'16px 28px',borderRadius:8,textDecoration:'none',fontSize:16}}>Hazlo online</a>
      </div>
    </section>
    <Footer/>
    <WhatsAppFab/>
    <EmailModal open={modal} onClose={()=>setModal(false)}/>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
