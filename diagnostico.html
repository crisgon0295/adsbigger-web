            </div>
            <div style={{ marginTop: 28 }}>
              <div className="input-label">Diagnóstico</div>
              <p className="sub" style={{ fontSize: 20, fontStyle: 'italic', color: '#e0e0e0', marginTop: 12, lineHeight: 1.5 }}>{primary.diag}</p>
            </div>
            <div style={{ marginTop: 32, padding: '24px', background: 'rgba(23,157,255,0.08)', border: '1px solid rgba(23,157,255,0.3)', borderRadius: 10 }}>
              <div className="mono" style={{ fontSize: 11, color: 'var(--blue)', letterSpacing: '.2em', textTransform: 'uppercase' }}>Lo que necesitas instalar</div>
              <div style={{ fontSize: 16, color: '#cfe7ff', marginTop: 10, lineHeight: 1.5 }}>{primary.need}</div>
            </div>
          </div>

          {tier.qualified ? (
            <QualifyForm email={email} onSubmit={handleQualifySubmit} />
          ) : (
            <div className="card-white" style={{ padding: '40px', marginTop: 56, textAlign: 'center' }}>
              <h3 className="sg headline-md" style={{ color: 'var(--red)' }}>Tu estructura necesita un reset.</h3>
              <p className="sub" style={{ fontSize: 18, color: '#555', marginTop: 12, maxWidth: 500, margin: '12px auto 0' }}>
                Con un puntaje Crítico, iniciar una escala ahora mismo te traería problemas. Empieza por leer los 5 cuellos de botella para entender cómo frenar la fuga.
              </p>
              <a href="/cuellos-de-botella" className="btn btn-red sg" style={{ marginTop: 24 }}>Descargar PDF Gratuito →</a>
            </div>
          )}

          <div style={{ textAlign: 'center', marginTop: 80 }}>
            <button onClick={onRestart} className="btn-ghost" style={{ padding: '12px 24px', fontSize: 13, border: 'none', background: 'transparent', textDecoration: 'underline', color: '#666', cursor: 'pointer' }}>
              ↻ Hacer el diagnóstico de nuevo
            </button>
          </div>
        </div>
      </section>
    </>
  );
}

/* =============== APP =============== */
function App() {
  const [stage, setStage] = useState('email'); // email, intro, q, result
  const [idx, setIdx] = useState(0);
  const [answers, setAnswers] = useState(BOTTLENECKS.map(() => Array(5).fill(false)));
  const [email, setEmail] = useState('');

  useEffect(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('adsb_bant') || 'null');
      if (saved) {
        if (saved.email) setEmail(saved.email);
        if (saved.stage) setStage(saved.stage);
        if (typeof saved.idx === 'number') setIdx(saved.idx);
        if (Array.isArray(saved.answers)) setAnswers(saved.answers);
      }
    } catch {}
  }, []);

  useEffect(() => {
    localStorage.setItem('adsb_bant', JSON.stringify({ stage, idx, answers, email }));
  }, [stage, idx, answers, email]);

  const toggle = (i) => {
    setAnswers(a => { const n = a.map(r => [...r]); n[idx][i] = !n[idx][i]; return n; });
  };

  const next = () => {
    if (idx < BOTTLENECKS.length - 1) { setIdx(idx + 1); window.scrollTo(0, 0); }
    else { setStage('result'); window.scrollTo(0, 0); }
  };
  const prev = () => {
    if (idx > 0) { setIdx(idx - 1); window.scrollTo(0, 0); }
  };

  const startQs = () => { setStage('q'); setIdx(0); window.scrollTo(0, 0); };
  const onEmail = (e) => { setEmail(e); setStage('intro'); window.scrollTo(0, 0); };
  const restart = () => {
    setAnswers(BOTTLENECKS.map(() => Array(5).fill(false)));
    setStage('email'); setIdx(0); setEmail('');
    localStorage.removeItem('adsb_bant');
    window.scrollTo(0, 0);
  };

  return (
    <>
      <Navbar />
      {stage === 'email' && <EmailGate onContinue={onEmail} prefill={email} />}
      {stage === 'intro' && <Intro onStart={startQs} email={email} />}
      {stage === 'q' && <Section b={BOTTLENECKS[idx]} idx={idx} total={BOTTLENECKS.length} answers={answers[idx]} toggle={toggle} onNext={next} onPrev={prev} />}
      {stage === 'result' && <Result scores={answers.map(r => r.filter(Boolean).length)} email={email} onRestart={restart} />}
      <Footer />
      <WhatsAppFab />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
