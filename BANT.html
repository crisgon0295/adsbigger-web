/* =============== SECTION =============== */
function Section({b, idx, total, answers, toggle, onNext, onPrev}){
  const checked = answers.filter(Boolean).length;
  const verdict = checked<=1 ? ['No es tu cuello principal.','#666'] : checked<=3 ? ['Cuello activo. Te está frenando.','#F5C518'] : ['Cuello crítico. Prioridad máxima.','#D51A05'];
  return (
    <section style={{background:'#111',padding:'60px 32px 120px',position:'relative'}}>
      <div style={{maxWidth:1000,margin:'0 auto'}}>
        <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:32}}>
          <div className="mono" style={{fontSize:11,color:'#888',letterSpacing:'.25em'}}>CUELLO {b.n} / 05</div>
          <div style={{flex:1,height:2,background:'rgba(255,255,255,0.08)',borderRadius:2,overflow:'hidden',position:'relative'}}>
            <div style={{position:'absolute',inset:0,width:`${((idx+1)/total)*100}%`,background:'linear-gradient(90deg,#179DFF,#D51A05)',transition:'width 400ms ease'}}/>
          </div>
          <div className="mono" style={{fontSize:11,color:'#888'}}>{idx+1}/{total}</div>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:40,alignItems:'start'}}>
          <div style={{position:'sticky',top:100,animation:'fadeUp 400ms ease both'}}>
            <div className="sg" style={{fontSize:'clamp(60px,8vw,120px)',color:b.color,lineHeight:0.9}}>{b.n}</div>
            <h2 className="sg" style={{fontSize:'clamp(32px,4vw,46px)',lineHeight:1,marginTop:4,textWrap:'balance'}}>{b.t}</h2>
            <p className="sub" style={{fontSize:20,color:'#cfcfcf',marginTop:14,fontStyle:'italic',lineHeight:1.4,textWrap:'balance'}}>{b.subtitle}</p>

            <div style={{marginTop:32,padding:'20px 22px',background:'#151515',border:`1px solid ${b.color}30`,borderRadius:12}}>
              <div className="mono" style={{fontSize:10,color:'#888',letterSpacing:'.25em',textTransform:'uppercase'}}>Puntaje en este cuello</div>
              <div style={{display:'flex',alignItems:'baseline',gap:10,marginTop:6}}>
                <div className="sg" style={{fontSize:54,color:b.color,lineHeight:1,animation:'pop 300ms ease'}} key={checked}>{checked}</div>
                <div style={{fontSize:18,color:'#666'}}>/ 5</div>
              </div>
              <div style={{marginTop:12,height:6,background:'rgba(255,255,255,0.06)',borderRadius:99,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${(checked/5)*100}%`,background:b.color,transition:'width 300ms ease',borderRadius:99}}/>
              </div>
              <div className="sub" style={{fontSize:15,color:verdict[1],marginTop:12,fontStyle:'italic'}}>{verdict[0]}</div>
            </div>

            <div style={{marginTop:20,display:'flex',gap:10}}>
              {idx>0 && <button onClick={onPrev} className="sg" style={{background:'transparent',border:'1px solid rgba(255,255,255,0.15)',color:'#ddd',padding:'13px 18px',borderRadius:8,fontSize:14,cursor:'pointer'}}>← Anterior</button>}
              <button onClick={onNext} className="sg" style={{flex:1,background:b.color,color:b.color==='#F5C518'?'#0A0A0A':'#fff',padding:'14px 20px',borderRadius:8,border:'none',fontSize:15,cursor:'pointer',letterSpacing:'.02em'}}>
                {idx===total-1 ? 'Ver mi diagnóstico →' : 'Siguiente cuello →'}
              </button>
            </div>
          </div>

          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            <div className="mono" style={{fontSize:10,color:'#888',letterSpacing:'.25em',textTransform:'uppercase',marginBottom:6}}>Marca cada afirmación verdadera</div>
            {b.items.map((item,i)=>{
              const on = answers[i];
              return (
                <label key={i} className={`opt ${on?'checked':''}`} style={{display:'flex',alignItems:'flex-start',gap:14,padding:'16px 18px',border:'1px solid rgba(255,255,255,0.08)',borderRadius:10,animation:`fadeUp 300ms ${i*60}ms ease both`,opacity:0}}>
                  <input type="checkbox" checked={on} onChange={()=>toggle(i)} style={{display:'none'}}/>
                  <div className="box">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6.5L5 9.5L10 3" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  </div>
                  <div style={{flex:1,display:'flex',gap:10}}>
                    <div className="mono" style={{fontSize:11,color:'#666',flexShrink:0,marginTop:2}}>{b.n}.{i+1}</div>
                    <div style={{fontSize:15,color:on?'#fff':'#cfcfcf',lineHeight:1.45}}>{item}</div>
                  </div>
                </label>
              );
            })}
          </div>
        </div>
      </div>
    </section>
  );
}

/* =============== RESULT =============== */
function Result({scores, user, onRestart}){
  const total = scores.reduce((a,b)=>a+b,0);
  const tier = TIERS.find(t=>total>=t.r[0]&&total<=t.r[1]) || TIERS[0];
  const ranked = scores.map((s,i)=>({s,i})).sort((a,b)=>b.s-a.s);
  const primary = BOTTLENECKS[ranked[0].i];
  const secondary = ranked[1].s>=3 ? BOTTLENECKS[ranked[1].i] : null;

  return (
    <>
    <section style={{background:'#111',padding:'60px 32px 80px',borderBottom:'1px solid rgba(255,255,255,0.06)',position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',top:-160,left:'50%',transform:'translateX(-50%)',width:900,height:500,background:`radial-gradient(ellipse at center,${tier.c}25,transparent 60%)`,filter:'blur(30px)',pointerEvents:'none'}}/>
      <div style={{maxWidth:1100,margin:'0 auto',position:'relative'}}>
        <div className="mono" style={{fontSize:11,color:tier.c,letterSpacing:'.3em',textTransform:'uppercase'}}>{tier.lvl} · tu resultado</div>
        <div style={{display:'grid',gridTemplateColumns:'1.4fr 1fr',gap:56,alignItems:'end',marginTop:18}}>
          <div>
            <h1 className="sg" style={{fontSize:'clamp(44px,6.5vw,88px)',lineHeight:0.95,textWrap:'balance'}}>{tier.t}</h1>
            <p className="sub" style={{fontSize:22,color:'#cfcfcf',marginTop:18,lineHeight:1.4,fontStyle:'italic',maxWidth:560,textWrap:'balance'}}>{tier.d}</p>
            {user?.email && <div style={{marginTop:22,padding:'14px 18px',background:'rgba(23,157,255,0.08)',border:'1px solid rgba(23,157,255,0.3)',borderRadius:8,fontSize:14,color:'#cfe7ff'}}>
              Te enviamos este diagnóstico a <span className="mono" style={{color:'#fff'}}>{user.email}</span>.
            </div>}
          </div>
          <div style={{textAlign:'right'}}>
            <div className="mono" style={{fontSize:11,color:'#666',letterSpacing:'.25em',textTransform:'uppercase'}}>Puntaje total</div>
            <div className="sg" style={{fontSize:'clamp(120px,16vw,220px)',color:tier.c,lineHeight:0.85,animation:'pop 600ms ease'}}>{total}</div>
            <div className="mono" style={{fontSize:14,color:'#888'}}>de 25</div>
          </div>
        </div>
      </div>
    </section>

    <section style={{background:'#F4F4F4',color:'#0A0A0A',padding:'100px 32px'}}>
      <div style={{maxWidth:1100,margin:'0 auto'}}>
        <div className="mono" style={{fontSize:11,color:'#888',letterSpacing:'.25em',textTransform:'uppercase'}}>
          <span style={{color:'#D51A05'}}>◼</span>&nbsp;&nbsp;tu desglose por cuello
        </div>
        <h2 className="sg" style={{fontSize:'clamp(32px,4.5vw,56px)',lineHeight:1,margin:'18px 0 48px',maxWidth:800,textWrap:'balance'}}>Dónde está cada fuga, en números.</h2>
        <div style={{background:'#fff',border:'1px solid #E0E0E0',borderRadius:14,boxShadow:'0 2px 16px rgba(0,0,0,0.06)',overflow:'hidden'}}>
          {BOTTLENECKS.map((b,i)=>{
            const s = scores[i];
            const level = s<=1 ? ['Ok','#20D07A'] : s<=3 ? ['Activo','#F5C518'] : ['Crítico','#D51A05'];
            return (
              <div key={b.n} style={{display:'grid',gridTemplateColumns:'60px 1.6fr 1fr 120px 110px',gap:20,alignItems:'center',padding:'22px 28px',borderBottom:i<4?'1px solid #EEE':'none'}}>
                <div className="sg" style={{fontSize:32,color:b.color,lineHeight:1}}>{b.n}</div>
                <div>
                  <div className="sg" style={{fontSize:18,lineHeight:1.2}}>{b.t}</div>
                  <div className="sub" style={{fontSize:15,color:'#666',fontStyle:'italic',marginTop:2}}>{b.subtitle}</div>
                </div>
                <div style={{height:10,background:'#EEE',borderRadius:99,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${(s/5)*100}%`,background:level[1],borderRadius:99,transition:'width 800ms ease'}}/>
                </div>
                <div style={{textAlign:'right'}}>
                  <span className="sg" style={{fontSize:28,color:'#0A0A0A'}}>{s}</span>
                  <span className="mono" style={{fontSize:13,color:'#888',marginLeft:4}}>/ 5</span>
                </div>
                <div className="sg" style={{textAlign:'center',background:level[1]+'20',color:level[1],padding:'6px 12px',borderRadius:6,fontSize:12,letterSpacing:'.1em',textTransform:'uppercase'}}>{level[0]}</div>
              </div>
            );
          })}
        </div>

        <div style={{marginTop:48,display:'grid',gridTemplateColumns: secondary?'1fr 1fr':'1fr',gap:20}}>
          {[primary, secondary].filter(Boolean).map((b,idx)=>
            <div key={b.n} style={{background:'#0A0A0A',color:'#fff',borderRadius:14,padding:'36px 32px',position:'relative',overflow:'hidden'}}>
              <div style={{position:'absolute',top:0,left:0,right:0,height:3,background:b.color}}/>
              <div className="mono" style={{fontSize:11,color:b.color,letterSpacing:'.25em',textTransform:'uppercase'}}>
                {idx===0?'Cuello principal · atácalo primero':'Cuello secundario'}
              </div>
              <div style={{display:'flex',alignItems:'baseline',gap:14,marginTop:10}}>
                <div className="sg" style={{fontSize:42,color:b.color,lineHeight:1}}>{b.n}</div>
                <div className="sg" style={{fontSize:26,lineHeight:1.1}}>{b.t}</div>
              </div>
              <div style={{marginTop:20}}>
                <div className="mono" style={{fontSize:10,color:'#888',letterSpacing:'.2em',textTransform:'uppercase'}}>Diagnóstico</div>
                <p className="sub" style={{fontSize:17,fontStyle:'italic',color:'#e0e0e0',marginTop:8,lineHeight:1.5}}>{b.diag}</p>
              </div>
              <div style={{marginTop:22,padding:'16px 18px',background:'rgba(23,157,255,0.08)',border:'1px solid rgba(23,157,255,0.3)',borderRadius:8}}>
                <div className="mono" style={{fontSize:10,color:'#179DFF',letterSpacing:'.2em',textTransform:'uppercase'}}>Lo que necesitas</div>
                <div style={{fontSize:15,color:'#cfe7ff',marginTop:8,lineHeight:1.5}}>{b.need}</div>
              </div>
            </div>)}
        </div>
      </div>
    </section>

    <section style={{background:'#D51A05',color:'#fff',padding:'100px 32px',position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',inset:0,opacity:0.1,background:'repeating-linear-gradient(45deg,rgba(0,0,0,0.4) 0 2px,transparent 2px 8px)',pointerEvents:'none'}}/>
      <div style={{maxWidth:1000,margin:'0 auto',position:'relative',textAlign:'center'}}>
        <div className="mono" style={{fontSize:11,letterSpacing:'.3em',textTransform:'uppercase',opacity:.8}}>siguiente paso</div>
        <h2 className="sg" style={{fontSize:'clamp(40px,5.5vw,78px)',lineHeight:0.98,margin:'20px 0 0',textWrap:'balance'}}>
          {total>=16 ? 'Tu negocio no puede esperar 6 meses.' : total>=8 ? 'Ya sabes dónde está tu fuga.' : 'Listos para acelerar.'}
        </h2>
        <p className="sub" style={{fontSize:22,marginTop:20,maxWidth:640,marginLeft:'auto',marginRight:'auto',fontStyle:'italic',lineHeight:1.4}}>
          En 20 minutos, Cris (CEO de adsBigger) revisa tu resultado personalmente y te muestra exactamente qué sistema instalar primero. Sin pitch.
        </p>
        <div style={{marginTop:36,display:'flex',gap:14,justifyContent:'center',flexWrap:'wrap'}}>
          <a href="#" className="sg" style={{background:'#0A0A0A',color:'#fff',padding:'18px 30px',borderRadius:8,textDecoration:'none',fontSize:16,letterSpacing:'.02em',boxShadow:'0 12px 32px rgba(0,0,0,.3)'}}>Agendar llamada gratis →</a>
          <a href="Lead Magnet.html" className="sg" style={{background:'transparent',border:'2px solid #fff',color:'#fff',padding:'16px 28px',borderRadius:8,textDecoration:'none',fontSize:16}}>Descargar el PDF</a>
        </div>
        <button onClick={onRestart} className="mono" style={{marginTop:40,background:'transparent',border:'none',color:'#fff',opacity:.7,fontSize:12,letterSpacing:'.2em',textTransform:'uppercase',cursor:'pointer',textDecoration:'underline'}}>
          ↻ Hacer el diagnóstico de nuevo
        </button>
      </div>
    </section>
    </>
  );
}

/* =============== APP =============== */
function App(){
  // stage: 'email' | 'intro' | 'q' | 'result'
  const [stage,setStage] = useState('email');
  const [idx,setIdx] = useState(0);
  const [answers,setAnswers] = useState(BOTTLENECKS.map(()=>Array(5).fill(false)));
  const [user,setUser] = useState(null);
  const [prefillEmail,setPrefillEmail] = useState('');

  useEffect(()=>{
    // parse url
    try{
      const u = new URL(window.location.href);
      const e = u.searchParams.get('email');
      if(e && /.+@.+\..+/.test(e)) setPrefillEmail(e);
    }catch{}
    // restore saved state
    try{
      const saved = JSON.parse(localStorage.getItem('adsbigger_bant')||'null');
      if(saved){
        if(saved.user) setUser(saved.user);
        if(saved.stage) setStage(saved.stage);
        if(typeof saved.idx==='number') setIdx(saved.idx);
        if(Array.isArray(saved.answers)) setAnswers(saved.answers);
      }
    }catch{}
  },[]);
  useEffect(()=>{
    localStorage.setItem('adsbigger_bant', JSON.stringify({stage,idx,answers,user}));
  },[stage,idx,answers,user]);

  const toggle = (i)=>{
    setAnswers(a=>{ const next = a.map(r=>[...r]); next[idx][i] = !next[idx][i]; return next; });
  };
  const next = ()=>{
    if(idx<BOTTLENECKS.length-1){ setIdx(idx+1); window.scrollTo({top:0,behavior:'smooth'}); }
    else { setStage('result'); window.scrollTo({top:0,behavior:'smooth'}); }
  };
  const prev = ()=>{ if(idx>0){ setIdx(idx-1); window.scrollTo({top:0,behavior:'smooth'}); } };
  const startQuestions = ()=>{ setStage('q'); setIdx(0); window.scrollTo({top:0,behavior:'smooth'}); };
  const onEmailContinue = (form)=>{ setUser(form); setStage('intro'); window.scrollTo({top:0,behavior:'smooth'}); };
  const restart = ()=>{
    setAnswers(BOTTLENECKS.map(()=>Array(5).fill(false)));
    setStage('email'); setIdx(0); setUser(null);
    localStorage.removeItem('adsbigger_bant');
    window.scrollTo({top:0,behavior:'smooth'});
  };

  const scores = answers.map(r=>r.filter(Boolean).length);

  return <>
    <Navbar/>
    {stage==='email' && <EmailGate onContinue={onEmailContinue} prefill={prefillEmail}/>}
    {stage==='intro' && <Intro onStart={startQuestions} user={user}/>}
    {stage==='q' && <Section b={BOTTLENECKS[idx]} idx={idx} total={BOTTLENECKS.length} answers={answers[idx]} toggle={toggle} onNext={next} onPrev={prev}/>}
    {stage==='result' && <Result scores={scores} user={user} onRestart={restart}/>}
    <WhatsAppFab/>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
