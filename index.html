function useInView(threshold = 0.15) {
  const ref = useRef(null);
  const [v, setV] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver((es) => {
      es.forEach((e) => {
        if (e.isIntersecting) {
          setV(true);
          io.unobserve(el);
        }
      });
    }, { threshold });
    io.observe(el);
    return () => io.disconnect();
  }, [threshold]);
  return [ref, v];
}

function Reveal({ children, delay = 0, as: Tag = 'div', className = '', style = {} }) {
  const [r, v] = useInView();
  return <Tag ref={r} className={`reveal ${v ? 'visible' : ''} ${className}`} style={{ transitionDelay: `${delay}ms`, ...style }}>{children}</Tag>;
}

function useCounter(target, active, duration = 1400) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    if (!active) return;
    let raf, start;
    const ease = (t) => 1 - Math.pow(1 - t, 3);
    const step = (ts) => {
      if (!start) start = ts;
      const p = Math.min((ts - start) / duration, 1);
      setVal(target * ease(p));
      if (p < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [target, active, duration]);
  return val;
}

                        <div className="mono" style={{ fontSize: 10, color: '#888', letterSpacing: '.2em' }}>{c.n}</div>

                    <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 0', borderBottom: i < 2 ? '1px dashed rgba(255,255,255,0.06)' : 'none' }}>

                      <div style={{ fontSize: 15, color: '#e0e0e0' }}>{it}</div>

            </Reveal>

            <Reveal delay={200}>
              <div style={{
                marginTop: 20, padding: '18px 22px', background: 'rgba(213,26,5,0.08)',
                border: '1px solid rgba(213,26,5,0.35)', borderRadius: 10,

            </Reveal>

        </div>
      </div>
    </section>
